name: 'Notice Update for Dependabot with Project SEKAI'
description: 'Rename pull request titles created by Dependabot with Project SEKAI'
author: 'Narumikr'

inputs:
  github-token:
    description: 'GitHub token for API access'
    required: true
    default: ${{ github.token }}

runs:
  using: "composite"
  steps:
    - name: Fetch Dependabot metadata
      id: metadata
      if: github.event_name == 'pull_request' && github.event.pull_request.user.login == 'dependabot[bot]'
      uses: dependabot/fetch-metadata@v2
      with:
        github-token: ${{ inputs.github-token }}

    - name: Rename PR Title
      if: github.event_name == 'pull_request' && github.event.pull_request.user.login == 'dependabot[bot]'
      uses: actions/github-script@v8
      env:
        DEPENDENCY_NAMES: ${{ steps.metadata.outputs.dependency-names }}
        PREVIOUS_VERSION: ${{ steps.metadata.outputs.previous-version }}
        NEW_VERSION: ${{ steps.metadata.outputs.new-version }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const { loadCharacters, selectRandomCharacter, generateNewTitle } = require('${{ github.action_path }}/prsk-pr-rename.js');

          const dependencyNames = JSON.parse(process.env.DEPENDENCY_NAMES || '[]');
          const library = dependencyNames.join(', ');
          const fromVersion = process.env.PREVIOUS_VERSION;
          const toVersion = process.env.NEW_VERSION;

          if (!library || !fromVersion || !toVersion) {
            core.notice('Could not retrieve dependency metadata; skipping rename.');
            return;
          }

          console.log(`Updated Library: ${library}`);
          console.log(`Version: ${fromVersion} → ${toVersion}`);

          const characters = loadCharacters('${{ github.action_path }}');
          const character = selectRandomCharacter(characters);
          const newTitle = generateNewTitle({ library, fromVersion, toVersion }, character);

          console.log(`New title: ${newTitle}`);

          await github.rest.pulls.update({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: context.payload.pull_request.number,
            title: newTitle
          });
