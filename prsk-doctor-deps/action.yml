name: 'Doctor Deps with Project SEKAI'
description: 'npm outdated と npm audit を実行し、依存関係ヘルスレポートをコミットします'
author: 'narumikr'

inputs:
  github-token:
    description: 'GitHub token for API access'
    required: true
    default: ${{ github.token }}
  working-directory:
    description: 'npm コマンドを実行するディレクトリ（モノレポなどで npm プロジェクトがサブディレクトリにある場合に指定）'
    required: false
    default: '.'
  branch:
    description: 'レポートをコミットするブランチ名。存在しない場合はデフォルトブランチから作成されます。このブランチからデフォルトブランチへのPRが自動的に作成されます。'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Select prsk character
      id: select-character
      uses: actions/github-script@v8
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const { selectCharacter } = require('${{ github.action_path }}/prsk-doctor-deps.js');
          selectCharacter('${{ github.action_path }}', core);

    - name: Resolve branches and checkout target branch
      shell: bash
      env:
        DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        TARGET_BRANCH: ${{ inputs.branch }}
      run: |
        set -euo pipefail

        default_branch="$DEFAULT_BRANCH"
        if [ -z "$default_branch" ]; then
          default_branch="$(git remote show origin | sed -n '/HEAD branch/s/.*: //p')"
        fi

        if [ -z "$default_branch" ]; then
          echo "default ブランチを特定できないため終了します。"
          exit 1
        fi

        target_branch="$TARGET_BRANCH"

        git fetch origin "$default_branch"
        if git ls-remote --exit-code --heads origin "$target_branch" > /dev/null 2>&1; then
          git fetch origin "$target_branch"
          git checkout -B "$target_branch" "origin/$target_branch"
        else
          git checkout -B "$target_branch" "origin/$default_branch"
        fi

        echo "RESOLVED_DEFAULT_BRANCH=$default_branch" >> "$GITHUB_ENV"
        echo "RESOLVED_TARGET_BRANCH=$target_branch" >> "$GITHUB_ENV"

    - name: Run npm outdated
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
          npm ci --ignore-scripts --no-audit --no-fund
        elif [ -f package.json ]; then
          npm install --ignore-scripts --no-audit --no-fund
        else
          echo "package.json が見つからないため npm コマンドをスキップします。" > "$RUNNER_TEMP/npm-outdated.txt"
          echo '{}' > "$RUNNER_TEMP/npm-audit.json"
          exit 0
        fi

        npm outdated > "$RUNNER_TEMP/npm-outdated.txt" 2>&1 || true

    - name: Run npm audit
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: npm audit --json > "$RUNNER_TEMP/npm-audit.json" 2>/dev/null || true

    - name: Generate report
      shell: bash
      env:
        CHARACTER_NAME: ${{ steps.select-character.outputs.character-name }}
        CHARACTER_ICON: ${{ steps.select-character.outputs.character-icon }}
        CHARACTER_COMMENT: ${{ steps.select-character.outputs.character-comment }}
      run: node "${{ github.action_path }}/prsk-generate-report.js"

    - name: Commit report
      id: commit-report
      shell: bash
      env:
        GIT_AUTHOR_NAME: ${{ steps.select-character.outputs.character-name }}
        GIT_AUTHOR_EMAIL: ${{ steps.select-character.outputs.character-email }}
        GIT_COMMITTER_NAME: ${{ steps.select-character.outputs.character-name }}
        GIT_COMMITTER_EMAIL: ${{ steps.select-character.outputs.character-email }}
      run: |
        set -euo pipefail

        git add NPM_SECURITY_REPORT.md
        if git diff --staged --quiet; then
          echo "変更なし。コミットをスキップします。"
          echo "committed=false" >> "$GITHUB_OUTPUT"
        else
          git commit -m "${{ steps.select-character.outputs.character-icon }} | 依存関係レポート更新 🩺 "
          git push origin "HEAD:$RESOLVED_TARGET_BRANCH"
          echo "committed=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Create Pull Request
      if: steps.commit-report.outputs.committed == 'true'
      uses: actions/github-script@v8
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const owner = context.repo.owner;
          const repo = context.repo.repo;
          const head = process.env.RESOLVED_TARGET_BRANCH;
          const base = process.env.RESOLVED_DEFAULT_BRANCH;
          const characterIcon = '${{ steps.select-character.outputs.character-icon }}';
          const characterName = '${{ steps.select-character.outputs.character-name }}';

          const { data: pulls } = await github.rest.pulls.list({
            owner, repo, head: `${owner}:${head}`, base, state: 'open',
          });

          if (pulls.length > 0) {
            core.info(`既存のPRが見つかりました: ${pulls[0].html_url}`);
            return;
          }

          const { data: pr } = await github.rest.pulls.create({
            owner,
            repo,
            title: `${characterIcon} | 依存関係ヘルスレポート更新 🩺`,
            body: `${characterIcon} **${characterName}** が依存関係ヘルスレポートを更新しました。\n\n\`NPM_SECURITY_REPORT.md\` の内容を確認してください。`,
            head,
            base,
          });

          core.info(`PRを作成しました: ${pr.html_url}`);
